<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Skriveverktøy</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<h2>Skriv teksten din</h2>

<textarea id="editor" rows="15" cols="80"></textarea>
<br><br>

<button onclick="finish()">Fullfør</button>

<script>
let log = [];
let startTime = Date.now();

// Logg tastetrykk
document.getElementById("editor").addEventListener("input", (e) => {
    log.push({
        type: "input",
        value: e.target.value,
        time: Date.now() - startTime
    });
});

// Logg fokus ut/inn
window.addEventListener("blur", () => {
    log.push({
        type: "focus_lost",
        time: Date.now() - startTime
    });
});

window.addEventListener("focus", () => {
    log.push({
        type: "focus_gained",
        time: Date.now() - startTime
    });
});

// Lag PDF
function finish() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let text = document.getElementById("editor").value;

    doc.text("Elevtekst:", 10, 10);
    doc.text(text, 10, 20);

    let y = 100;
    doc.text("Logg:", 10, y);

    log.forEach(entry => {
        y += 10;
        doc.text(JSON.stringify(entry), 10, y);
    });

    doc.save("besvarelse.pdf");
}
</script>

</body>
</html>
