<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Tool</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            margin-top: 10px;
            padding: 10px 15px;
            font-size: 16px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <h1>Student Writing Tool</h1>
    <textarea id="writingArea" placeholder="Start writing your content here..."></textarea>
    <br>
    <button onclick="exportToPDF()">Export as PDF</button>
    <script>
        const { jsPDF } = window.jspdf;

        const writingArea = document.getElementById('writingArea');
        writingArea.addEventListener('focus', () => {
            console.log('Textarea focused!');
        });

        function exportToPDF() {
            const doc = new jsPDF();
            const text = writingArea.value;
            const pageHeight = doc.internal.pageSize.getHeight();
            const margin = 10;
            let y = margin;

            const lines = doc.splitTextToSize(text, 190);
            for (let i = 0; i < lines.length; i++) {
                if (y + 10 > pageHeight - margin) {
                    doc.addPage();
                    y = margin;
                }
                doc.text(lines[i], margin, y);
                y += 10;
            }

            doc.save('writing-tool.pdf');
        }
    </script>
</body>
</html>
